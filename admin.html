<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RVC Pilotos — Administración</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #2C2C2A;
  --accent2: #1a1a1a;
  --bg: #F5F3EE;
  --surface: #FFFFFF;
  --border: #E0DCD4;
  --text: #2C2C2A;
  --text2: #6B6963;
  --text3: #A09D96;
  --green: #3B6D11;
  --green-l: #EAF3DE;
  --red: #A32D2D;
  --red-l: #FCEBEB;
  --blue: #185FA5;
  --blue-l: #E6F1FB;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header { background: var(--accent); color: #fff; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 16px; font-weight: 600; }
.header-sub { font-size: 10px; opacity: .6; }
.hbtn { background: rgba(255,255,255,.15); color: #fff; border: none; border-radius: 8px; padding: 6px 12px; font-size: 12px; font-family: 'DM Sans', sans-serif; cursor: pointer; }
.hbtn:hover { background: rgba(255,255,255,.25); }
.hbtn.primary { background: #fff; color: var(--accent); font-weight: 600; }
.admin-badge { background: rgba(204,41,41,.2); color: #ff9999; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; margin-left: 6px; }

.login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #1a1a1a; }
.login-card { background: #fff; border-radius: 16px; padding: 40px 32px; width: 320px; text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,.3); }
.login-logo { width: 64px; height: 64px; background: var(--accent); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 28px; color: #fff; font-weight: 700; }
.login-card h2 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
.login-card p { font-size: 13px; color: var(--text2); margin-bottom: 28px; }
.login-btn { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
.login-btn:hover { background: var(--accent2); }
.login-err { color: var(--red); font-size: 12px; margin-top: 10px; }
.acceso-denegado { color: var(--red); font-size: 13px; background: var(--red-l); border-radius: 8px; padding: 10px; margin-top: 12px; }

.app { display: none; }

.tabs { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; gap: 4px; }
.tab { padding: 10px 18px; font-size: 13px; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; font-weight: 500; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover { background: var(--bg); }

.content { padding: 20px; max-width: 1100px; margin: 0 auto; }

.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.section-title { font-size: 18px; font-weight: 600; }
.section-stats { font-size: 12px; color: var(--text2); }

.btn-primary { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; }
.btn-primary:hover { background: var(--accent2); }

.table { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.table-row { display: grid; grid-template-columns: 36px 1.5fr 1.5fr 2fr 90px 90px; padding: 10px 16px; border-bottom: 1px solid var(--border); align-items: center; gap: 12px; }
.table-row.header { background: #EAE6DF; font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
.table-row:last-child { border-bottom: none; }
.table-row.data:hover { background: var(--bg); }
.user-avatar { width: 30px; height: 30px; background: var(--accent); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 13px; }
.user-nombre { font-weight: 500; font-size: 13px; }
.user-email { font-size: 11px; color: var(--text2); }
.tags { display: flex; flex-wrap: wrap; gap: 4px; }
.tag { background: var(--blue-l); color: var(--blue); padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.tag.empty { background: var(--bg); color: var(--text3); }
.estado-badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; display: inline-block; }
.estado-on { background: var(--green-l); color: var(--green); }
.estado-off { background: var(--bg); color: var(--text3); }
.row-actions { display: flex; gap: 4px; }
.action-btn { background: none; border: none; cursor: pointer; padding: 4px 6px; border-radius: 4px; font-size: 13px; color: var(--text2); }
.action-btn:hover { background: var(--bg); color: var(--accent); }
.action-btn.del:hover { background: var(--red-l); color: var(--red); }
.move-btns { display: flex; flex-direction: column; gap: 1px; }
.move-btn { background: none; border: none; cursor: pointer; padding: 0 4px; font-size: 9px; color: var(--text3); line-height: 1.1; }
.move-btn:hover { color: var(--accent); }
.move-btn:disabled { opacity: .3; cursor: not-allowed; }

.table-row.apps { grid-template-columns: 36px 40px 1.5fr 2fr 1fr 90px 90px; }

.empty-state { text-align: center; padding: 40px 20px; color: var(--text3); }
.empty-state div { font-size: 32px; margin-bottom: 8px; }

.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
.modal-bg.open { display: flex; }
.modal { background: var(--surface); border-radius: 16px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
.modal-inner { padding: 20px; }
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 14px; }
.fg { margin-bottom: 10px; }
.fl { display: block; font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.fi { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; min-height: 38px; }
.fi:focus { border-color: var(--accent); background: var(--surface); }
.fi:disabled { background: var(--bg); color: var(--text3); }
.apps-checkboxes { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
.app-check { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--bg); border-radius: 8px; cursor: pointer; }
.app-check:hover { background: #EAE6DF; }
.app-check input { width: 16px; height: 16px; accent-color: var(--accent); }
.app-check-info { flex: 1; }
.app-check-name { font-size: 13px; font-weight: 500; }
.app-check-desc { font-size: 11px; color: var(--text2); }
.toggle { display: flex; align-items: center; gap: 8px; }
.toggle input { width: 18px; height: 18px; accent-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; margin-top: 14px; }
.mbtn { flex: 1; padding: 10px; border-radius: 10px; border: none; font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 600; cursor: pointer; }
.mbtn-cancel { background: var(--bg); color: var(--text2); }
.mbtn-save { background: var(--accent); color: #fff; }
.mbtn-save:hover { background: var(--accent2); }
.mbtn-del { background: var(--red-l); color: var(--red); flex: 0 0 auto; padding: 10px 16px; }
.mbtn-del:hover { background: var(--red); color: #fff; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #2C2C2A; color: #fff; padding: 8px 18px; border-radius: 20px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }

.rt-badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(59,109,17,.15); color: var(--green); font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; margin-left: 8px; }
.rt-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

@media(max-width: 768px) {
  .table-row { grid-template-columns: 36px 1fr 80px 60px; gap: 8px; padding: 10px; }
  .table-row .col-apps, .table-row .col-estado { display: none; }
  .table-row.apps { grid-template-columns: 36px 30px 1fr 80px 60px; }
  .table-row.apps .col-url { display: none; }
}
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-logo">⚙</div>
    <h2>RVC Pilotos</h2>
    <p>Administración de accesos</p>
    <button class="login-btn" id="login-btn" onclick="signIn()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#fff" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fff" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#fff" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Iniciar sesión con Google
    </button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<div class="app" id="app">
  <div class="header">
    <div>
      <h1>RVC Pilotos <span class="admin-badge">ADMIN</span> <span class="rt-badge"><span class="rt-dot"></span>En vivo</span></h1>
      <div class="header-sub" id="hdr-user"></div>
    </div>
    <button class="hbtn" onclick="signOut()" style="font-size:11px">Salir</button>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-users" onclick="showTab('users')">👥 Usuarios</div>
    <div class="tab" id="tab-apps" onclick="showTab('apps')">📦 Apps</div>
  </div>

  <div class="content">

    <div id="users-section">
      <div class="section-header">
        <div>
          <div class="section-title">Usuarios de la plataforma</div>
          <div class="section-stats" id="users-stats">Cargando...</div>
        </div>
        <button class="btn-primary" onclick="openUserModal()">+ Nuevo usuario</button>
      </div>
      <div class="table" id="users-table">
        <div class="table-row header">
          <span></span>
          <span>Nombre</span>
          <span>Email</span>
          <span class="col-apps">Apps asignadas</span>
          <span class="col-estado">Estado</span>
          <span></span>
        </div>
        <div id="users-list"></div>
      </div>
    </div>

    <div id="apps-section" style="display:none">
      <div class="section-header">
        <div>
          <div class="section-title">Apps de la plataforma</div>
          <div class="section-stats" id="apps-stats">Cargando...</div>
        </div>
        <button class="btn-primary" onclick="openAppModal()">+ Nueva app</button>
      </div>
      <div class="table" id="apps-table">
        <div class="table-row apps header">
          <span></span>
          <span>Orden</span>
          <span>Nombre</span>
          <span class="col-url">URL</span>
          <span>ID</span>
          <span class="col-estado">Estado</span>
          <span></span>
        </div>
        <div id="apps-list"></div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL USUARIO -->
<div class="modal-bg" id="user-modal" onclick="if(event.target===this)closeUserModal()">
  <div class="modal">
    <div class="modal-inner">
      <div class="modal-title" id="user-modal-title">Nuevo usuario</div>
      <div class="fg">
        <label class="fl">Email</label>
        <input class="fi" id="u-email" placeholder="usuario@gmail.com" autocomplete="off">
      </div>
      <div class="fg">
        <label class="fl">Nombre</label>
        <input class="fi" id="u-nombre" placeholder="Nombre completo" autocomplete="off">
      </div>
      <div class="fg">
        <label class="fl">Apps asignadas</label>
        <div class="apps-checkboxes" id="apps-checkboxes"></div>
      </div>
      <div class="fg">
        <label class="fl">Estado</label>
        <label class="toggle">
          <input type="checkbox" id="u-activo" checked>
          <span>Usuario activo (puede acceder a las apps asignadas)</span>
        </label>
      </div>
      <div class="modal-btns">
        <button class="mbtn mbtn-del" id="btn-del-user" onclick="deleteUser()" style="display:none">🗑</button>
        <button class="mbtn mbtn-cancel" onclick="closeUserModal()">Cancelar</button>
        <button class="mbtn mbtn-save" onclick="saveUser()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL APP -->
<div class="modal-bg" id="app-modal" onclick="if(event.target===this)closeAppModal()">
  <div class="modal">
    <div class="modal-inner">
      <div class="modal-title" id="app-modal-title">Nueva app</div>
      <div class="fg">
        <label class="fl">ID (sin espacios, ej: piloto2)</label>
        <input class="fi" id="a-id" placeholder="piloto2" autocomplete="off">
      </div>
      <div class="fg">
        <label class="fl">Nombre</label>
        <input class="fi" id="a-nombre" placeholder="Nombre de la app" autocomplete="off">
      </div>
      <div class="fg">
        <label class="fl">Descripción</label>
        <input class="fi" id="a-descripcion" placeholder="Qué hace esta app" autocomplete="off">
      </div>
      <div class="fg">
        <label class="fl">URL pública</label>
        <input class="fi" id="a-url" placeholder="https://..." autocomplete="off">
      </div>
      <div class="fg">
        <label class="fl">Estado</label>
        <label class="toggle">
          <input type="checkbox" id="a-activa" checked>
          <span>App activa</span>
        </label>
      </div>
      <div class="modal-btns">
        <button class="mbtn mbtn-del" id="btn-del-app" onclick="deleteApp()" style="display:none">🗑</button>
        <button class="mbtn mbtn-cancel" onclick="closeAppModal()">Cancelar</button>
        <button class="mbtn mbtn-save" onclick="saveApp()">Guardar</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCmUlkihNfxV8CyHOZ-38gcEx27jqU0z04",
  authDomain: "rvc-pilotos-app.firebaseapp.com",
  projectId: "rvc-pilotos-app",
  storageBucket: "rvc-pilotos-app.firebasestorage.app",
  messagingSenderId: "304566913753",
  appId: "1:304566913753:web:f1936de8ca85188338ccc8"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);
const provider = new GoogleAuthProvider();

const ADMINS = ['rodortino@gmail.com', 'pilotosaplicaciones@gmail.com'];

let currentUser = null;
let usuarios = [];
let apps = [];
let unsubUsers = null, unsubApps = null;
let editUserEmail = null, editAppId = null;

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

window.signIn = async function(){
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-err');
  err.textContent = '';
  btn.textContent = 'Conectando...';
  try { await signInWithPopup(auth, provider); }
  catch(e) { btn.textContent = 'Iniciar sesión con Google'; err.textContent = 'Error: ' + (e.message||''); }
};

window.signOut = async function(){
  if(!confirm('¿Cerrar sesión?')) return;
  if(unsubUsers) unsubUsers();
  if(unsubApps) unsubApps();
  await fbSignOut(auth);
};

onAuthStateChanged(auth, user => {
  if(user){
    const email = (user.email||'').toLowerCase();
    if(!ADMINS.includes(email)){
      fbSignOut(auth);
      document.getElementById('login-err').innerHTML = `<div class="acceso-denegado">⛔ Tu cuenta <strong>${email}</strong> no tiene permisos de administrador.</div>`;
      document.getElementById('login-btn').textContent = 'Iniciar sesión con Google';
      return;
    }
    currentUser = user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('hdr-user').textContent = email;
    startListeners();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

function startListeners(){
  unsubUsers = onSnapshot(collection(db,'plataforma_usuarios'), snap => {
    usuarios = snap.docs.map(d=>({email:d.id, ...d.data()}));
    renderUsers();
  });
  unsubApps = onSnapshot(collection(db,'plataforma_apps'), snap => {
    apps = snap.docs.map(d=>({id:d.id, ...d.data()}));
    renderApps();
    renderUsers();
  });
}

window.showTab = function(t){
  document.getElementById('tab-users').classList.toggle('active', t==='users');
  document.getElementById('tab-apps').classList.toggle('active', t==='apps');
  document.getElementById('users-section').style.display = t==='users'?'block':'none';
  document.getElementById('apps-section').style.display = t==='apps'?'block':'none';
};

function renderUsers(){
  document.getElementById('users-stats').textContent = `${usuarios.length} usuario(s), ${usuarios.filter(u=>u.activo).length} activo(s)`;
  const list = document.getElementById('users-list');
  if(usuarios.length===0){
    list.innerHTML = '<div class="empty-state"><div>👥</div>No hay usuarios. Crea el primero.</div>';
    return;
  }
  list.innerHTML = usuarios.map(u=>{
    const inicial = (u.nombre||u.email||'?')[0].toUpperCase();
    const userApps = (u.apps||[]).map(aid=>{
      const a = apps.find(x=>x.id===aid);
      return a ? a.nombre : aid;
    });
    const appsHtml = userApps.length>0
      ? userApps.map(n=>`<span class="tag">${esc(n)}</span>`).join('')
      : '<span class="tag empty">sin apps</span>';
    return `<div class="table-row data" onclick="openUserModal('${u.email}')">
      <div class="user-avatar">${inicial}</div>
      <div>
        <div class="user-nombre">${esc(u.nombre||'(sin nombre)')}</div>
      </div>
      <div class="user-email">${esc(u.email)}</div>
      <div class="col-apps"><div class="tags">${appsHtml}</div></div>
      <div class="col-estado"><span class="estado-badge ${u.activo?'estado-on':'estado-off'}">${u.activo?'Activo':'Inactivo'}</span></div>
      <div class="row-actions"><button class="action-btn" title="Editar">✏️</button></div>
    </div>`;
  }).join('');
}

function renderApps(){
  // Ordenar apps por campo "orden" (las sin orden van al final)
  apps.sort((a,b)=>{
    const oa = a.orden===undefined ? 9999 : a.orden;
    const ob = b.orden===undefined ? 9999 : b.orden;
    return oa - ob;
  });
  document.getElementById('apps-stats').textContent = `${apps.length} app(s), ${apps.filter(a=>a.activa).length} activa(s)`;
  const list = document.getElementById('apps-list');
  if(apps.length===0){
    list.innerHTML = '<div class="empty-state"><div>📦</div>No hay apps. Crea la primera.</div>';
    return;
  }
  list.innerHTML = apps.map((a,i)=>{
    const upDis = i===0 ? 'disabled' : '';
    const downDis = i===apps.length-1 ? 'disabled' : '';
    return `<div class="table-row apps data" onclick="openAppModal('${a.id}')">
      <div class="user-avatar" style="background:var(--blue);font-size:14px">📦</div>
      <div class="move-btns" onclick="event.stopPropagation()">
        <button class="move-btn" onclick="moveApp('${a.id}',-1)" ${upDis} title="Subir">▲</button>
        <button class="move-btn" onclick="moveApp('${a.id}',1)" ${downDis} title="Bajar">▼</button>
      </div>
      <div>
        <div class="user-nombre">${esc(a.nombre||'(sin nombre)')}</div>
        <div class="user-email">${esc(a.descripcion||'')}</div>
      </div>
      <div class="col-url"><a href="${esc(a.url||'#')}" target="_blank" onclick="event.stopPropagation()" style="font-size:11px;color:var(--blue)">${esc(a.url||'')}</a></div>
      <div><span class="tag">${esc(a.id)}</span></div>
      <div class="col-estado"><span class="estado-badge ${a.activa?'estado-on':'estado-off'}">${a.activa?'Activa':'Inactiva'}</span></div>
      <div class="row-actions"><button class="action-btn" title="Editar">✏️</button></div>
    </div>`;
  }).join('');
}

// ── MODAL USUARIO ─────────────────────────────────────────────
window.openUserModal = function(email){
  editUserEmail = email||null;
  document.getElementById('user-modal-title').textContent = email ? 'Editar usuario' : 'Nuevo usuario';
  document.getElementById('btn-del-user').style.display = email ? 'inline-block' : 'none';
  // Cargar checkboxes de apps
  const cont = document.getElementById('apps-checkboxes');
  if(apps.length===0){
    cont.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:8px">Crea primero apps en la pestaña Apps</div>';
  } else {
    cont.innerHTML = apps.map(a=>`
      <label class="app-check">
        <input type="checkbox" value="${esc(a.id)}" data-app="${esc(a.id)}">
        <div class="app-check-info">
          <div class="app-check-name">${esc(a.nombre)}</div>
          <div class="app-check-desc">${esc(a.descripcion||'')}</div>
        </div>
      </label>
    `).join('');
  }
  if(email){
    const u = usuarios.find(x=>x.email===email);
    if(u){
      document.getElementById('u-email').value = u.email;
      document.getElementById('u-email').disabled = true;
      document.getElementById('u-nombre').value = u.nombre||'';
      document.getElementById('u-activo').checked = u.activo!==false;
      (u.apps||[]).forEach(aid=>{
        const cb = cont.querySelector(`input[data-app="${aid}"]`);
        if(cb) cb.checked = true;
      });
    }
  } else {
    document.getElementById('u-email').value = '';
    document.getElementById('u-email').disabled = false;
    document.getElementById('u-nombre').value = '';
    document.getElementById('u-activo').checked = true;
  }
  document.getElementById('user-modal').classList.add('open');
};

window.closeUserModal = function(){ document.getElementById('user-modal').classList.remove('open'); editUserEmail=null; };

window.saveUser = async function(){
  const email = document.getElementById('u-email').value.trim().toLowerCase();
  if(!email || !email.includes('@')){ alert('Email inválido'); return; }
  const nombre = document.getElementById('u-nombre').value.trim();
  const activo = document.getElementById('u-activo').checked;
  const appsAsignadas = [...document.querySelectorAll('#apps-checkboxes input:checked')].map(cb=>cb.value);
  try {
    await setDoc(doc(db,'plataforma_usuarios',email), {
      nombre, activo, apps: appsAsignadas
    }, { merge: true });
    showToast(editUserEmail ? '✓ Usuario actualizado' : '✓ Usuario creado');
    closeUserModal();
  } catch(e){ showToast('⚠ Error al guardar'); console.error(e); }
};

window.deleteUser = async function(){
  if(!editUserEmail) return;
  if(!confirm(`¿Eliminar al usuario ${editUserEmail}?`)) return;
  try {
    await deleteDoc(doc(db,'plataforma_usuarios',editUserEmail));
    showToast('✓ Usuario eliminado');
    closeUserModal();
  } catch(e){ showToast('⚠ Error al eliminar'); }
};

// ── MODAL APP ─────────────────────────────────────────────────
window.openAppModal = function(id){
  editAppId = id||null;
  document.getElementById('app-modal-title').textContent = id ? 'Editar app' : 'Nueva app';
  document.getElementById('btn-del-app').style.display = id ? 'inline-block' : 'none';
  if(id){
    const a = apps.find(x=>x.id===id);
    if(a){
      document.getElementById('a-id').value = a.id;
      document.getElementById('a-id').disabled = true;
      document.getElementById('a-nombre').value = a.nombre||'';
      document.getElementById('a-descripcion').value = a.descripcion||'';
      document.getElementById('a-url').value = a.url||'';
      document.getElementById('a-activa').checked = a.activa!==false;
    }
  } else {
    document.getElementById('a-id').value = '';
    document.getElementById('a-id').disabled = false;
    document.getElementById('a-nombre').value = '';
    document.getElementById('a-descripcion').value = '';
    document.getElementById('a-url').value = '';
    document.getElementById('a-activa').checked = true;
  }
  document.getElementById('app-modal').classList.add('open');
};

window.closeAppModal = function(){ document.getElementById('app-modal').classList.remove('open'); editAppId=null; };

window.saveApp = async function(){
  const id = document.getElementById('a-id').value.trim().toLowerCase().replace(/\s+/g,'');
  if(!id){ alert('ID requerido'); return; }
  const nombre = document.getElementById('a-nombre').value.trim();
  const descripcion = document.getElementById('a-descripcion').value.trim();
  const url = document.getElementById('a-url').value.trim();
  const activa = document.getElementById('a-activa').checked;
  try {
    await setDoc(doc(db,'plataforma_apps',id), { nombre, descripcion, url, activa }, { merge: true });
    showToast(editAppId ? '✓ App actualizada' : '✓ App creada');
    closeAppModal();
  } catch(e){ showToast('⚠ Error al guardar'); console.error(e); }
};

window.deleteApp = async function(){
  if(!editAppId) return;
  if(!confirm(`¿Eliminar la app ${editAppId}? Esto NO elimina las tareas de la app, solo la quita de la plataforma.`)) return;
  try {
    await deleteDoc(doc(db,'plataforma_apps',editAppId));
    showToast('✓ App eliminada');
    closeAppModal();
  } catch(e){ showToast('⚠ Error al eliminar'); }
};

window.moveApp = async function(id, dir){
  // Asegurar que todas las apps tengan campo "orden" coherente
  const ordenadas = [...apps];
  ordenadas.sort((a,b)=>{
    const oa = a.orden===undefined ? 9999 : a.orden;
    const ob = b.orden===undefined ? 9999 : b.orden;
    return oa - ob;
  });
  const idx = ordenadas.findIndex(a=>a.id===id);
  if(idx<0) return;
  const newIdx = idx + dir;
  if(newIdx<0 || newIdx>=ordenadas.length) return;
  // Swap
  const tmp = ordenadas[idx];
  ordenadas[idx] = ordenadas[newIdx];
  ordenadas[newIdx] = tmp;
  // Reasignar orden 0, 1, 2... y persistir
  try {
    for(let i=0; i<ordenadas.length; i++){
      await setDoc(doc(db,'plataforma_apps',ordenadas[i].id), { orden: i }, { merge: true });
    }
    showToast('✓ Orden actualizado');
  } catch(e){ showToast('⚠ Error al reordenar'); console.error(e); }
};

function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
</script>
